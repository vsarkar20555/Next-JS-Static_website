name: Next.js EC2 Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::800309353239:role/GitHub_OIDC_role
          aws-region: ap-south-1

      - name: Trigger Deployment using AWS SSM
        run: |

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-0a82bcf38a1cbdc0e" \
            --document-name "AWS-RunShellScript" \
            --comment "Next.js Deployment" \
            --parameters 'commands=[
              "cd /opt/apps",
              "echo Starting deployment",
              "git pull origin main",
              "npm install",
              "npm run build",
              "pm2 reload ecosystem.config.js",
              "echo Waiting for health check",
              "sleep 10",
              "curl -f http://localhost:3000/api/health"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          sleep 5

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "i-0a82bcf38a1cbdc0e"
